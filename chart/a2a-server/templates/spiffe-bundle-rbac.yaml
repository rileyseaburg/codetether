{{- if and .Values.spiffe.enabled .Values.spiffe.bundle.configMap }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-{{ include "a2a-server.fullname" . }}-spiffe-bundle
  labels:
    {{- include "a2a-server.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: [{{ .Values.spiffe.bundle.configMap | quote }}]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-{{ include "a2a-server.fullname" . }}-spiffe-bundle
  labels:
    {{- include "a2a-server.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Namespace }}-{{ include "a2a-server.fullname" . }}-spiffe-bundle
subjects:
  - kind: ServiceAccount
    name: {{ include "a2a-server.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
