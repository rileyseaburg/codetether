{{- if and (not .Values.githubApp.existingSecret) (or .Values.githubApp.appId .Values.githubApp.privateKey .Values.githubApp.webhookSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "a2a-server.githubAppSecretName" . }}
  labels:
    {{- include "a2a-server.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.githubApp.appId }}
  GITHUB_APP_ID: {{ .Values.githubApp.appId | toString | b64enc | quote }}
  {{- end }}
  {{- if .Values.githubApp.privateKey }}
  GITHUB_APP_PRIVATE_KEY: {{ .Values.githubApp.privateKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.githubApp.webhookSecret }}
  GITHUB_WEBHOOK_SECRET: {{ .Values.githubApp.webhookSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.githubApp.apiBaseUrl }}
  GITHUB_APP_API_BASE_URL: {{ .Values.githubApp.apiBaseUrl | b64enc | quote }}
  {{- end }}
{{- end }}
