{{- if and .Values.serviceAccount.create .Values.agentIdentity.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "a2a-server.fullname" . }}-agent-identity
  labels:
    {{- include "a2a-server.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "a2a-server.fullname" . }}-agent-identity
  labels:
    {{- include "a2a-server.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "a2a-server.fullname" . }}-agent-identity
subjects:
  - kind: ServiceAccount
    name: {{ include "a2a-server.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
