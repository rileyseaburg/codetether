{{- if and (not .Values.provenance.existingSecret) .Values.provenance.signingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "a2a-server.provenanceSecretName" . }}
  labels:
    {{- include "a2a-server.labels" . | nindent 4 }}
type: Opaque
data:
  CODETETHER_SIGNING_SECRET: {{ .Values.provenance.signingSecret | b64enc | quote }}
{{- end }}
