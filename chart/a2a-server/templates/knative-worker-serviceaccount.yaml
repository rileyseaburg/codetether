{{- if .Values.knative.enabled }}
{{- $workerServiceAccount := .Values.knative.worker.serviceAccountName | default "codetether-worker" }}
{{- if and $workerServiceAccount (ne $workerServiceAccount (include "a2a-server.serviceAccountName" .)) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $workerServiceAccount }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "a2a-server.labels" . | nindent 4 }}
    app.kubernetes.io/component: knative-worker
  {{- if .Values.knative.worker.vault.enabled }}
  annotations:
    vault.hashicorp.com/agent-role: {{ .Values.knative.worker.vault.role | default "codetether-worker" | quote }}
  {{- end }}
automountServiceAccountToken: true
{{- with .Values.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
{{- end }}
