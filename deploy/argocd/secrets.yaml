apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: codetether-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: codetether-secrets
    app.kubernetes.io/part-of: codetether
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: codetether
  destination:
    server: https://kubernetes.default.svc
    namespace: a2a-system
  source:
    repoURL: git@github.com:rileyseaburg/codetether.git
    targetRevision: main
    path: deploy/secrets
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[]?.remoteRef.conversionStrategy
        - .spec.data[]?.remoteRef.decodingStrategy
        - .spec.data[]?.remoteRef.metadataPolicy
        - .spec.data[]?.remoteRef.nullBytePolicy
      jsonPointers:
        - /spec/target/template/engineVersion
        - /spec/target/template/mergePolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
      - PruneLast=true
