apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: codetether-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: codetether-secrets
    app.kubernetes.io/part-of: codetether
spec:
  project: codetether
  destination:
    server: https://kubernetes.default.svc
    namespace: a2a-system
  source:
    repoURL: git@github.com:rileyseaburg/codetether.git
    targetRevision: main
    path: deploy/secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - PruneLast=true
