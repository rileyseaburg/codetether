# Example only. Do not apply this file without replacing placeholders.
#
# Required before syncing deploy/argocd/application.yaml:
# - a2a-server-database: DATABASE_URL for PostgreSQL
# - a2a-server-auth-tokens: A2A_AUTH_TOKENS in "name:token,name2:token2" format
# - gcp-artifact-registry: docker-registry pull secret for Artifact Registry

apiVersion: v1
kind: Namespace
metadata:
  name: a2a-system
  labels:
    app.kubernetes.io/name: a2a-system
    app.kubernetes.io/part-of: codetether
---
apiVersion: v1
kind: Secret
metadata:
  name: a2a-server-database
  namespace: a2a-system
type: Opaque
stringData:
  DATABASE_URL: "postgresql://USER:PASSWORD@HOST:5432/a2a_server"
---
apiVersion: v1
kind: Secret
metadata:
  name: a2a-server-auth-tokens
  namespace: a2a-system
type: Opaque
stringData:
  A2A_AUTH_TOKENS: "worker:REPLACE_ME,admin:REPLACE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: gcp-artifact-registry
  namespace: a2a-system
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "us-central1-docker.pkg.dev": {
          "username": "_json_key",
          "password": "REPLACE_WITH_GCP_SERVICE_ACCOUNT_JSON",
          "auth": "REPLACE_WITH_BASE64__JSON_KEY_COLON_SERVICE_ACCOUNT_JSON"
        }
      }
    }
