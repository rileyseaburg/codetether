apiVersion: v1
kind: ServiceAccount
metadata:
  name: codetether-vault-sync
  namespace: a2a-server
  labels:
    app.kubernetes.io/name: codetether-vault-sync
    app.kubernetes.io/part-of: codetether
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: codetether-vault
  namespace: a2a-server
  labels:
    app.kubernetes.io/name: codetether-vault
    app.kubernetes.io/part-of: codetether
spec:
  provider:
    vault:
      server: http://vault.vault.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: codetether-a2a-live-secret-sync
          serviceAccountRef:
            name: codetether-vault-sync
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: codetether-a2a-server-database
  namespace: a2a-server
  labels:
    app.kubernetes.io/name: codetether-a2a-server-database
    app.kubernetes.io/part-of: codetether
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: codetether-vault
    kind: SecretStore
  target:
    name: codetether-a2a-server-database
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: codetether/live-a2a-server/database
        property: DATABASE_URL
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: codetether-a2a-server-minio
  namespace: a2a-server
  labels:
    app.kubernetes.io/name: codetether-a2a-server-minio
    app.kubernetes.io/part-of: codetether
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: codetether-vault
    kind: SecretStore
  target:
    name: codetether-a2a-server-minio
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  data:
    - secretKey: accessKey
      remoteRef:
        key: codetether/live-a2a-server/minio
        property: accessKey
    - secretKey: secretKey
      remoteRef:
        key: codetether/live-a2a-server/minio
        property: secretKey
---
