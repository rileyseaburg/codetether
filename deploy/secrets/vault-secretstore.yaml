apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: codetether-vault
  namespace: a2a-system
  labels:
    app.kubernetes.io/name: codetether-vault
    app.kubernetes.io/part-of: codetether
spec:
  provider:
    vault:
      server: http://vault.vault.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: codetether-a2a-server-secret-sync
          serviceAccountRef:
            name: codetether-vault-sync
