apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: a2a-server-database
  namespace: a2a-system
  labels:
    app.kubernetes.io/name: a2a-server-database
    app.kubernetes.io/part-of: codetether
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: codetether-vault
    kind: SecretStore
  target:
    name: a2a-server-database
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: codetether/a2a-server/database
        property: DATABASE_URL
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: a2a-server-auth-tokens
  namespace: a2a-system
  labels:
    app.kubernetes.io/name: a2a-server-auth-tokens
    app.kubernetes.io/part-of: codetether
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: codetether-vault
    kind: SecretStore
  target:
    name: a2a-server-auth-tokens
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  data:
    - secretKey: A2A_AUTH_TOKENS
      remoteRef:
        key: codetether/a2a-server/auth
        property: A2A_AUTH_TOKENS
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gcp-artifact-registry
  namespace: a2a-system
  labels:
    app.kubernetes.io/name: gcp-artifact-registry
    app.kubernetes.io/part-of: codetether
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: codetether-vault
    kind: SecretStore
  target:
    name: gcp-artifact-registry
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: codetether/a2a-server/artifact-registry
        property: .dockerconfigjson
